<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — MediAI</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar">
      <a href="../index.html" class="nav-brand" style="text-decoration: none"
        >Medi<span>AI</span></a
      >
      <div class="nav-links">
        <a href="register.html">Create account</a>
      </div>
    </nav>

    <div class="auth-page">
      <div class="auth-card">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your health dashboard</p>

        <div class="form-error" id="loginError"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="email">Email address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
          </div>
          <button type="submit" class="btn-submit" id="loginBtn">
            Sign In
          </button>
        </form>

        <p class="auth-link">
          Don't have an account? <a href="register.html">Sign up free</a>
        </p>
        <p class="auth-link mt-8"><a href="#">Hospital / Admin login →</a></p>
      </div>
    </div>

    <script src="../js/auth.js"></script>
  </body>
</html>
