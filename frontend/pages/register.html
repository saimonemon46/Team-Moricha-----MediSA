<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — MediAI</title>
<link rel="stylesheet" href="../css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="nav-brand" style="text-decoration:none">Medi<span>AI</span></a>
  <div class="nav-links">
    <a href="login.html">Sign in</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Create account</h2>
    <p class="subtitle">Your personal health assistant starts here</p>

    <div class="form-error" id="regError"></div>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="grid-2">
        <div class="form-group">
          <label for="first_name">First name</label>
          <input type="text" id="first_name" name="first_name" placeholder="Rahim" required>
        </div>
        <div class="form-group">
          <label for="last_name">Last name</label>
          <input type="text" id="last_name" name="last_name" placeholder="Uddin" required>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" placeholder="+880 1XXX XXXXXX">
      </div>
      <div class="form-group">
        <label for="dob">Date of birth</label>
        <input type="date" id="dob" name="dob">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Minimum 8 characters" required minlength="8">
      </div>
      <div class="form-group">
        <label for="password2">Confirm password</label>
        <input type="password" id="password2" name="password2" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn-submit" id="regBtn">Create Account</button>
    </form>

    <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</div>

<script src="../js/auth.js"></script>
</body>
</html>
