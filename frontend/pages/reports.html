<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Reports — MediAI</title>
<link rel="stylesheet" href="../css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">Medi<span>AI</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="nav-icon">◈</span> Dashboard</a>
      <a href="symptom-chat.html"><span class="nav-icon">◎</span> Symptom Check</a>
      <a href="reports.html" class="active"><span class="nav-icon">◉</span> My Reports</a>
      <a href="documents.html"><span class="nav-icon">⬡</span> Documents</a>
      <a href="medications.html"><span class="nav-icon">◇</span> Medications</a>
      <a href="doctors.html"><span class="nav-icon">⊕</span> Find Doctors</a>
      <a href="appointments.html"><span class="nav-icon">▷</span> Appointments</a>
    </nav>
    <div class="sidebar-user">
      <strong id="sidebarUserName">–</strong>
      <a href="#" onclick="logout()">Sign out</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Triage Reports</h1>
      <p>All your AI-generated health assessments</p>
    </div>

    <div id="reportsList">
      <div class="card">
        <p class="text-muted" style="text-align:center;padding:40px 0">Loading reports...</p>
      </div>
    </div>

    <!-- Report Detail Modal -->
    <div id="reportModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;overflow-y:auto;padding:40px 20px">
      <div style="max-width:640px;margin:0 auto">
        <div class="report-card" id="reportDetail"></div>
        <button onclick="document.getElementById('reportModal').style.display='none'" class="btn-ghost" style="margin-top:16px;width:100%;display:block;text-align:center">Close</button>
      </div>
    </div>
  </main>
</div>

<script src="../js/reports.js"></script>
</body>
</html>
